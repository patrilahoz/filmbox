<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>


    <style>
        /* Contenedor principal */
.multi-select {
    position: relative;
    width: 100%;
    font-family: Arial, sans-serif;
}

/* Botón */
.select-btn {
    background: #7b2cbf;
    color: white;
    padding: 12px;
    border-radius: 6px;
    cursor: pointer;
    user-select: none;
    transition: background 0.3s ease;
}

.select-btn:hover {
    background: #5a189a;
}

/* Dropdown */
.select-dropdown {
    display: none;
    position: absolute;
    width: 100%;
    background: #f8f0fc;
    border: 1px solid #d0b3ff;
    border-radius: 6px;
    margin-top: 5px;
    padding: 10px;
    max-height: 180px;
    overflow-y: auto;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    z-index: 10;
}

/* Opciones */
.option {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 4px;
    cursor: pointer;
    border-radius: 4px;
}

.option:hover {
    background: #e9d8fd;
}

    </style>

</head>
<body>

    <div class="form-group">
    <label for="generos">GÉNEROS</label>

    <div class="multi-select" id="genreSelect">
        <div class="select-btn" id="genreSelectBtn">
            Seleccionar géneros
        </div>

        <div class="select-dropdown" id="genreDropdown">
            {% for genero in form.generos.field.queryset %}
            <label class="option">
                <input type="checkbox" name="generos" value="{{ genero.id }}">
                {{ genero.nombre }}
            </label>
            {% endfor %}
        </div>
    </div>
</div>

</body>

<script>
    document.addEventListener("DOMContentLoaded", () => {
    const btn = document.getElementById("genreSelectBtn");
    const dropdown = document.getElementById("genreDropdown");

    // Abrir/cerrar menú
    btn.addEventListener("click", () => {
        dropdown.style.display = dropdown.style.display === "block" ? "none" : "block";
    });

    // Cerrar si se hace clic fuera
    document.addEventListener("click", (e) => {
        if (!document.getElementById("genreSelect").contains(e.target)) {
            dropdown.style.display = "none";
        }
    });

    // Actualizar texto del botón según selección
    dropdown.addEventListener("change", () => {
        const checked = [...dropdown.querySelectorAll("input[type='checkbox']:checked")];
        if (checked.length === 0) {
            btn.textContent = "Seleccionar géneros";
        } else if (checked.length === 1) {
            btn.textContent = checked[0].parentElement.textContent.trim();
        } else {
            btn.textContent = `${checked.length} géneros seleccionados`;
        }
    });
});

</script>
</html>
