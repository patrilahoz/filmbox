{% extends "base/base.html" %}
{% load static %}

{% block title %}Seleccionar película{% endblock %}

{% block extra_css %}

<style>
    :root {
        --bg: #191919;
        --card: #2d2d2d;
        --panel: #373737;
        --input: #1f1f1f;
        --muted: #bdbdbd;
        --accent: #7c3aed;
        --accent-2: #6d28d9;
        --white: #fafafa;
    }

    * {
        box-sizing: border-box;
    }

    html,
    body {
        height: 100%;
        font-family: 'Gantari';
    }

    body {
        margin: 0;
        font-family: Inter, 'Segoe UI', Roboto, Arial, sans-serif;
        background: var(--bg);
        color: var(--white);
        -webkit-font-smoothing: antialiased;
    }

    /* Main container */
    .container {
        padding: 28px 48px;
    }

    .panel {
        background: #373737;
        border-radius: 20px;
        border: transparent;
        padding: 40px;
        height: 85vh;
        display: flex;
        flex-direction: column;
        position: relative;
        padding: 20px;
    }

    /* Search box */
    .search-movie {
        background: rgba(255, 255, 255, 0.06);
        padding: 12px 18px;
        border-radius: 999px;
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 36px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        transition:
            border 0.55s cubic-bezier(0.33, 1, 0.68, 1),
            transform 0.55s cubic-bezier(0.33, 1, 0.68, 1),
            box-shadow 0.55s cubic-bezier(0.33, 1, 0.68, 1);
        flex-shrink: 0;
    }

    /* Movies grid wrapper with scroll */
    .movies-grid-wrapper {
        flex: 1;
        overflow-y: scroll;
        overflow-x: hidden;
        margin-bottom: 80px;
        padding: 0;
    }

    .movies-grid-wrapper::-webkit-scrollbar {
        width: 8px;
    }

    .movies-grid-wrapper::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 0;
    }

    .movies-grid-wrapper::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 0;
    }

    .movies-grid-wrapper::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.3);
    }

    .search-movie input {
        border: 0;
        background: transparent;
        color: var(--muted);
        outline: none;
        flex: 1;
        font-size: 14px;
    }

    .search-movie:hover {
        border: 1px solid #d0b3ff;
        transform: translateY(-0.5px) scale(1.008);
        box-shadow: 0 4px 12px rgba(208, 179, 255, 0.15);
    }


    .search-movie input::placeholder {
        color: rgba(255, 255, 255, 0.4);
    }

    .search-movie i {
        color: rgba(255, 255, 255, 0.3);
        font-size: 16px;
    }

    /* Movie grid */
    .movies-grid {
        display: grid;
        grid-template-columns: repeat(8, 1fr);
        gap: 20px;
        margin-bottom: 0;
        padding: 20px 20px 20px 20px;
    }

    .catalogo-item {
        width: 100%;
        aspect-ratio: 2 / 3;
        background: #111;
        border-radius: 8px;
        overflow: hidden;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .catalogo-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .catalogo-item:hover {
        transform: scale(1.05);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        border: 2px solid #d0b3ff;
    }

    /* Bottom section with button - Fixed at bottom of panel */
    .bottom-section {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        position: absolute;
        bottom: 40px;
        right: 40px;
        flex-shrink: 0;
    }

    .add-movie-btn {
        background: #6E32D5;
        color: var(--white);
        width: 300px;
        height: 50px;
        padding: 12px 18px;
        border-radius: 8px;
        border: 0;
        font-family: 'Exo 2';
        font-weight: 700;
        font-size: 20px;
        display: inline-flex;
        align-items: center;
        cursor: pointer;
        text-align: center;
        justify-content: center;
        text-decoration: none;
        transition: transform 0.6s ease, background 0.3s ease, box-shadow 0.3s ease;
    }

    .add-movie-btn:hover {
        background: linear-gradient(100deg, #6E32D5 0%, #6C00FA 100%);
        color: var(--white);
        box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
        transform: translateY(-2px) scale(1.05);
    }

    .add-movie-btn .hover-icon {
        display: none;
    }

    /* Responsive */
    @media (max-width: 1400px) {
        .movies-grid {
            grid-template-columns: repeat(6, 1fr);
        }
    }

    @media (max-width: 1100px) {
        .movies-grid {
            grid-template-columns: repeat(4, 1fr);
        }
    }

    @media (max-width: 800px) {
        .movies-grid {
            grid-template-columns: repeat(3, 1fr);
        }
    }

    @media (max-width: 600px) {
        .movies-grid {
            grid-template-columns: repeat(3, 1fr);
        }

        .container {
            padding: 18px 24px;
        }

        .panel {
            padding: 24px;
        }
    }

    @media (max-width: 900px) {
        .movies-grid {
            grid-template-columns: repeat(3, 1fr);
        }

    }
</style>

{% endblock %}

{% block content %}
<main>
    <div class="container">
        <div class="panel">
            <!-- Search bar inside panel -->
            <div class="search-movie">
                <i class="bi bi-search"></i>
                <input type="text" id="searchInput" placeholder="Buscar película...">
            </div>

            <!-- Movies grid wrapper with scroll -->
            <div class="movies-grid-wrapper">
                <!-- Movie grid -->
                <div class="movies-grid" id="moviesGrid">
                    {% for pelicula in peliculas %}
                    <a href="{% url 'pelicula' pelicula.id %}" class="catalogo-item" data-title="{{ pelicula.titulo }}">
                        <img src="{{ pelicula.poster.url }}" alt="{{ pelicula.titulo }}">
                    </a>
                    {% endfor %}
                </div>
            </div>

            <!-- Add movie button -->
            <div class="bottom-section">
                <a href="add_movie.html" class="add-movie-btn">
                    <i class="bi bi-check2-square" style="margin-right: 10px; font-size: 1.25rem;"></i>
                    SELECCIONAR PELÍCULA
                </a>
            </div>
        </div>
    </div>
</main>

<script>
    // Search functionality
    const searchInput = document.getElementById('searchInput');
    const moviesGrid = document.getElementById('moviesGrid');
    const catalogoItems = moviesGrid.querySelectorAll('.catalogo-item');

    searchInput.addEventListener('input', (e) => {
        const searchTerm = e.target.value.toLowerCase();
        
        catalogoItems.forEach(item => {
            const title = item.getAttribute('data-title').toLowerCase();
            if (title.includes(searchTerm)) {
                item.style.display = '';
            } else {
                item.style.display = 'none';
            }
        });
    });
</script>
{% endblock %}
