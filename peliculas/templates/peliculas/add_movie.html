{% extends "base/base.html" %}

{% block title %}Añadir película{% endblock %}

{% block extra_css %}

<style>
    :root {
        --bg: #191919;
        --panel: #262626;
        --accent: #e9dff0;
        --muted: #bdbdbd;
        --accent: #7c3aed;
        --accent-2: #6d28d9;
        --white: #fafafa;
    }

    * {
        box-sizing: border-box
    }

    html,
    body {
        height: 100%
    }

    body {
        margin: 0;
        font-family: 'Gantari';
        background: var(--bg);
        color: var(--white);
        -webkit-font-smoothing: antialiased;
    }

    h1 {
        font-family: 'Exo 2';
        font-weight: 800;
        font-size: 40px;
        letter-spacing: 1px;
        color: var(--white);
        text-transform: uppercase;
    }

    /* Main card */
    .card-wrap {
        padding: 28px 48px;
    }

    .card {
        background: var(--card);
        padding: 36px;
        border-radius: 15px;
        max-width: 1200px;
        margin: 0 auto;
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.01) inset;
    }

    .card h1 {
        margin: 0 0 24px 0;
        font-size: 32px;
        font-weight: 700;
        color: var(--white);
    }

    .content {
        display: flex;
        gap: 48px;
        align-items: flex-start;
    }

    /* Left: image dropzone */
    .thumb-wrap {
        width: 320px;
        height: 440px;
        border: 2px solid rgba(255, 255, 255, 0.08);
        background: #2a2a2a;
        border-radius: 4px;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }

    .thumb-inner {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        font-size: 14px;
    }

    .thumb-inner img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }

    .thumb-overlay {
        position: absolute;
        inset: 12px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 2px;
        pointer-events: none;
    }

    .thumb-actions {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0;
        pointer-events: none;
    }

    .upload-btn {
        background: transparent;
        color: var(--muted);
        padding: 0;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        pointer-events: auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }

    #removeBtn {
        position: absolute;
        bottom: 12px;
        right: 12px;
        display: none;
        background: #D9BDFE;
        color: black;
        border: 2px dashed rgba(255, 255, 255, 0.06);
        padding: 8px 12px;
        border-radius: 4px;
        cursor: pointer;
        pointer-events: auto;
        transition: transform 0.6s ease, background 0.3s ease, box-shadow 0.3s ease;

    }

    #removeBtn:hover {
        background: linear-gradient(100deg, #6E32D5 0%, #6C00FA 100%);
        color: var(--white);
        box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
        transform: translateY(-2px) scale(1.05);
        font-weight: 700;
    }

    input[type=file] {
        display: none;
    }

    /* Right: form */
    .form {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 18px;
    }

    .row {
        display: flex;
        flex-direction: column;
        gap: 14px;
    }

    .form-group {

        display: flex;
        align-items: flex-start;
        gap: 10px;
    }

    .form-group label {
        width: 160px;
        text-align: left;
        font-family: 'Gantari';
        font-weight: 700;
        font-size: 18px;
        color: var(--white);
        text-transform: uppercase;
        letter-spacing: 0.6px;
        padding-top: 8px;

    }

    .form-group input,
    .form-group textarea {
        flex: 1;
        padding: 12px 14px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.04);
        background: var(--input);
        color: var(--muted);
        font-size: 14px;
        resize: vertical;
        min-height: 40px;
        font-family: 'Gantari';
    }

    .form-group textarea {
        min-height: 100px;
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
        color: #999;
    }

    .actions {
        display: flex;
        justify-content: flex-end;
        margin-top: 18px;
    }





    /* Selector múltiple de géneros */
    /* Contenedor principal */
    .multi-select {
        position: relative;
        width: 100%;

        flex: 1;
        background: var(--input);
        color: var(--muted);
        font-size: 14px;
        resize: vertical;
        min-height: 40px;
        font-family: 'Gantari';

    }

    /* Botón seleccionar géneros */
    .select-btn {
        cursor: pointer;
        user-select: none;
        transition: background 0.3s ease;

        display: flex;
        justify-content: space-between;
        align-items: center;

        flex: 1;
        padding: 12px 14px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.04);
        background: var(--input);
        color: var(--muted);
        font-size: 14px;
        resize: vertical;
        min-height: 40px;
        font-family: 'Gantari';

    }

    .select-btn:hover {
        background: linear-gradient(100deg, #6E32D5 0%, #6C00FA 100%);
        color: var(--white);
        box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
    }




    /* Desplegable */
    .select-dropdown {
        max-height: 0;
        opacity: 0;
        overflow-y: hidden;

        width: 100%;
        border: 1px solid #d0b3ff;
        border-radius: 6px;
        margin-top: 5px;
        padding: 0;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        z-index: 10;

        transform: translateY(-6px);
        transition:
            max-height 0.10s ease,
            opacity 0.25s ease,
            transform 0.10s ease,
            padding 0.25s ease;
    }

    .select-dropdown.open {
        max-height: 200px;
        opacity: 1;
        padding: 10px;
        overflow-y: auto;
        transform: translateY(0);
    }



    .select-dropdown .option {
        display: flex;
        flex-direction: row;
        align-items: center;
        width: 100%;
        gap: 10px;
        padding: 6px 4px;
        font-size: 14px;
        font-weight: 500;
        font-family: 'Gantari';
        color: var(--white);
    }



    /* Seleccionar opciones */
    .multi-select .option input[type="checkbox"] {
        all: unset;
        box-sizing: border-box;
        width: 18px;
        height: 18px;
        border: 2px solid #6E32D5;
        border-radius: 3px;
        cursor: pointer;
        display: inline-block;
        flex-shrink: 0;
        margin: 10px;
        padding: 0;
        position: relative;
    }

    .multi-select .option input[type="checkbox"]::after {
        content: "✔";
        font-size: 14px;
        color: white;
        position: absolute;
        opacity: 0;
        top: -2px;
        left: 2px;
        transition: opacity 0.15s ease-in-out;
    }

    .multi-select .option input[type="checkbox"]:checked {
        background: #6C00FA;
        border-color: #6C00FA;
    }

    .multi-select .option input[type="checkbox"]:checked::after {
        opacity: 1;
    }










    /* BOTÓN AÑADIR PELÍCULA*/
    .add-btn {
        background: #6E32D5;
        color: var(--white);
        width: 250px;
        height: 50px;
        padding: 12px 18px;
        border-radius: 8px;
        border: 0;
        font-family: 'Exo 2';
        font-weight: 700;
        font-size: 30px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        text-align: center;
        justify-content: center;
        font-size: 20px;
        transition: transform 0.6s ease, background 0.3s ease, box-shadow 0.3s ease;
    }

    .add-btn:hover {
        background: linear-gradient(100deg, #6E32D5 0%, #6C00FA 100%);
        color: var(--white);
        box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
        transform: translateY(-2px) scale(1.05);
    }

    .add-btn .hover-icon {
        display: none;
    }






    .plus {
        width: 28px;
        height: 28px;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.12);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
    }

    @media (max-width:980px) {
        .content {
            flex-direction: column;
            align-items: center
        }

        .thumb-wrap {
            width: 280px;
            height: 380px
        }

        .labels {
            width: 140px
        }
    }
</style>
{% endblock %}

{% block content %}
<main>
    <div class="card-wrap">
        <div class="card">
            <h1>AÑADIR PELÍCULA</h1>

            <div class="content">

                <!-- Left: image upload / preview -->


                <!-- Right: form -->



                <form class="form" id="addMovieForm" method="POST" enctype="multipart/form-data">
                    {% csrf_token %}


                    <div class="thumb-wrap" id="thumbWrap">
                        <div class="thumb-inner" id="thumbInner">
                            <span style="color:rgba(255,255,255,0.12)"></span>
                        </div>
                        <div class="thumb-overlay"></div>
                        <div class="thumb-actions">
                            <label id="uploadLabel" class="upload-btn" for="posterInput">
                                <i class="bi bi-plus" aria-hidden style="font-size: 5rem;"></i>
                            </label>
                            <button class="upload-btn" type="button" id="removeBtn" title="Quitar">Quitar</button>
                        </div>

                        <!-- Este input SÍ debe tener name="poster" -->
                        <input type="file" id="posterInput" name="poster" accept="image/*">
                    </div>



                    <div class="row">

                        <!-- TÍTULO -->
                        <div class="form-group">
                            <label for="title">TÍTULO</label>
                            <input type="text" id="titulo" name="titulo" placeholder="Añadir título" required>
                        </div>

                        <!-- AÑO -->
                        <div class="form-group">
                            <label for="year">AÑO</label>
                            <input type="number" id="año" name="año" placeholder="Añadir año">
                        </div>

                        <!-- DIRECTOR -->
                        <div class="form-group">
                            <label for="director">DIRECTOR</label>
                            <input type="text" id="director" name="director" placeholder="Añadir director">
                        </div>

                        <!-- DURACIÓN -->
                        <div class="form-group">
                            <label for="duracion_min">DURACIÓN (min)</label>
                            <input type="number" id="duracion_min" name="duracion_min" placeholder="Añadir duración">
                        </div>

                        <!-- REPARTO -->
                        <div class="form-group">
                            <label for="cast">REPARTO</label>
                            <textarea id="reparto_info" name="reparto_info" placeholder="Añadir reparto"></textarea>
                        </div>

                        <!-- GÉNEROS (selector múltiple) -->
                        <div class="form-group">
                            <label for="generos">GÉNEROS</label>

                            <div class="multi-select" id="genreSelect">
                                <div class="select-btn" id="genreSelectBtn">
                                    Seleccionar géneros
                                    <i class="bi bi-caret-down-fill" style="font-size: 0.75rem; margin-right: 3px;"></i>
                                </div>

                                <div class="select-dropdown" id="genreDropdown">
                                    {% for genero in form.generos.field.queryset %}
                                    <label class="option">
                                        <input type="checkbox" class="check-generos" name="generos"
                                            value="{{ genero.id }}">
                                        <span>{{ genero.nombre }}</span>
                                    </label>

                                    {% endfor %}
                                </div>
                            </div>
                        </div>



                        <!-- SINOPSIS -->
                        <div class="form-group">
                            <label for="sinopsis">SINOPSIS</label>
                            <textarea id="sinopsis" name="sinopsis" placeholder="Añadir sinopsis"></textarea>
                        </div>

                    </div>

                    <div class="actions">
                        <button type="submit" class="add-btn">
                            <i class="bi bi-save" style="font-size: 1.2rem; margin-right: 6px;"></i>
                            GUARDAR
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</main>




<script>
    // ============================
    // DESPLEGABLE DE GÉNEROS
    // ============================
    document.addEventListener("DOMContentLoaded", () => {
        const btn = document.getElementById("genreSelectBtn");
        const dropdown = document.getElementById("genreDropdown");
        const wrapper = document.getElementById("genreSelect");

        // Abrir/cerrar menú
        btn.addEventListener("click", (e) => {
            e.stopPropagation();
            dropdown.classList.toggle("open");
        });

        // Cerrar si se hace clic fuera
        document.addEventListener("click", (e) => {
            if (!wrapper.contains(e.target)) {
                dropdown.classList.remove("open");
            }
        });

        // Actualizar texto del botón según selección
        dropdown.addEventListener("change", () => {
            const checked = [...dropdown.querySelectorAll("input[type='checkbox']:checked")];

            if (checked.length === 0) {
                btn.textContent = "Seleccionar géneros";
            } else if (checked.length === 1) {
                btn.textContent = checked[0].parentElement.textContent.trim();
            } else {
                btn.textContent = `${checked.length} géneros seleccionados`;
            }
        });
    });

    // ============================
    // PREVISUALIZACIÓN DEL PÓSTER
    // ============================
    const posterInput = document.getElementById('posterInput');
    const thumbInner = document.getElementById('thumbInner');
    const removeBtn = document.getElementById('removeBtn');
    const uploadLabel = document.getElementById('uploadLabel');

    function clearPreview() {
        thumbInner.innerHTML = '';
        thumbInner.style.justifyContent = 'center';
        thumbInner.style.alignItems = 'center';

        if (removeBtn) removeBtn.style.display = 'none';
        if (uploadLabel) uploadLabel.style.display = 'inline-flex';
    }

    function showPreview(file) {
        const img = document.createElement('img');
        img.alt = 'Movie Poster';
        img.src = URL.createObjectURL(file);

        thumbInner.innerHTML = '';
        thumbInner.appendChild(img);

        if (removeBtn) removeBtn.style.display = 'inline-block';
        if (uploadLabel) uploadLabel.style.display = 'none';
    }

    posterInput.addEventListener('change', (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return clearPreview();

        if (!file.type.startsWith('image/')) {
            alert('Por favor selecciona una imagen válida.');
            posterInput.value = '';
            return;
        }

        showPreview(file);
    });

    removeBtn.addEventListener('click', () => {
        posterInput.value = '';
        clearPreview();
    });

    clearPreview();
</script>


{% endblock %}
